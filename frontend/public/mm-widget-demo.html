<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мировые мощности · CRM widget demo</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f8f1;
        color: #1f211f;
      }
      .hero {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 430px;
        gap: 28px;
        align-items: center;
        max-width: 1160px;
        margin: 0 auto;
        padding: 36px 18px;
      }
      h1 {
        font-size: clamp(36px, 6vw, 72px);
        line-height: 1.02;
        margin: 0 0 18px;
        color: #16261f;
      }
      p {
        max-width: 620px;
        font-size: 18px;
        line-height: 1.6;
        color: #667464;
      }
      .brand {
        font-weight: 900;
        color: #50b743;
      }
      @media (max-width: 860px) {
        .hero {
          grid-template-columns: 1fr;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <section>
        <div class="brand">мировые-мощности.рф</div>
        <h1>Тепловые насосы и оборудование со склада</h1>
        <p>
          Это демо обычной страницы сайта. Виджет справа подключен одним script-тегом,
          берет каталог из CRM и отправляет заявку в воронку продаж.
        </p>
      </section>
      <aside id="mm-crm-widget"></aside>
    </main>
    <script
      src="/mm-crm-widget.js"
      data-api="http://127.0.0.1:3001"
      data-site-key="sk_live_torenaone_main"
      data-target="#mm-crm-widget"
      data-title="Получить расчет"
      data-button="Отправить в CRM"
    ></script>
  </body>
</html>
